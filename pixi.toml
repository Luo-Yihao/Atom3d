[workspace]
name = "atom3d"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
uv = "*"
ninja = "*"
compilers = "*"
sysroot_linux-64 = ">=2.17"
cuda-toolkit = "12.4.*"

[pypi-options]
no-build-isolation = ["atom3d"]
extra-index-urls = ["https://download.pytorch.org/whl/cu124"]

[pypi-dependencies]
atom3d = { path = ".", editable = true }
torch = ">=2.6.0,<2.7"
numpy = ">=1.20"
trimesh = ">=3.0"

[tasks]
test = "python -c \"from atom3d import MeshBVH; print('atom3d OK')\""
